services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=OpenCBT_Db;Username=postgres;Password=postgres;Maximum Pool Size=500;
      - Redis__Configuration=redis:6379,abortConnect=false
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=OpenCBT_Db
    ports:
      - "5555:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command: postgres -c max_connections=1000

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
